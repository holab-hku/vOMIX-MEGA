# .readthedocs.yaml (at the root of your repo)
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

python:
  install:
    # Points Sphinx to the requirements file inside the docs folder
    - requirements: docs/requirements.txt

sphinx:
  # Points ReadTheDocs to the configuration file inside the docs folder
  configuration: docs/conf.py
