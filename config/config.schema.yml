  - metacerberus-setup-params
  - pharokka-db
  - phabox2-db-name
  - phabox2-db-baselink
  - iphop-db-version
  - eggNOG-params
  - PhaVIP-params
  - virsorter2-annotate-params
  - dram-v-annotate-params
  - dram-v-distill-params
  - metacerberus-params
  - pharokka-params
